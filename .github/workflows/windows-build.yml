name: Windows build
on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [created]
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run dist
      - uses: actions/upload-artifact@v4
        with:
          name: Madrador-Remote-Windows
          path: dist/*.exe
      - name: Attach installer to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
